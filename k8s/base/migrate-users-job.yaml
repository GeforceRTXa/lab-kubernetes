apiVersion: batch/v1
kind: Job
metadata:
  name: migrate-users
  namespace: messager
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 120
  template:
    spec:
      restartPolicy: Never
      initContainers:
        - name: wait-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z postgres 5432; do echo "waiting..."; sleep 3; done
      containers:
        - name: migrate-users
          image: mablinov2704/user-service:latest
          command: ["/bin/sh", "-c"]
          args: ["goose -dir /app/migrations postgres \"$GOOSE_DBSTRING\" up"]
          env:
            - name: GOOSE_DRIVER
              value: postgres
            - name: GOOSE_DBSTRING
              valueFrom:
                secretKeyRef:
                  name: messager-db-secret
                  key: USER_DB_DSN
            - name: GOOSE_MIGRATION_DIR
              value: /app/migrations
