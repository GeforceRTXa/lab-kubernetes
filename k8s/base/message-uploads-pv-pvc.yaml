apiVersion: v1
kind: PersistentVolume
metadata:
  name: s3-pv-messager-uploads
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: csi-s3
  csi:
    driver: ru.yandex.s3.csi
    volumeHandle: messager-uploads-volume
    nodePublishSecretRef:
      name: csi-s3-secret
      namespace: messager
    nodeStageSecretRef:
      name: csi-s3-secret
      namespace: messager
    volumeAttributes:
      bucketName: uploads
      mounter: geesefs
      endpoint: "http://minio.messager.svc.cluster.local:9000"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: message-uploads-pvc
  namespace: messager
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: csi-s3
  resources:
    requests:
      storage: 10Gi
  volumeName: s3-pv-messager-uploads
